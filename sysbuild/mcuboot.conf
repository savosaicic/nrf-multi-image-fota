# Kconfig fragment applied to the mcuboot image

# Enable the MCUboot hook call sites.
CONFIG_BOOT_IMAGE_ACCESS_HOOKS=y
# boot_go_hook runs at the very top of MCUboot main() and can fully replace
# MCUboot's built-in image/slot selection by filling a boot_rsp and returning
# FIH_SUCCESS. This is the only hook that works in swap mode.
# The find-next-slot hook only fires under DirectXIP/RAM-load
CONFIG_BOOT_GO_HOOKS=y

# The default nRF5340 network-core update hook is force-enabled by NCS
# whenever BOOT_IMAGE_ACCESS_HOOKS=y, but it only compiles on nRF5340.
# Disable it to provide our own hook.
CONFIG_BOOT_IMAGE_ACCESS_HOOK_NRF5340=n

CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y

# CONFIG_UPDATEABLE_IMAGE_NUMBER=2 is set automatically by sysbuild from SB_CONFIG_MCUBOOT_UPDATEABLE_IMAGES

# External flash
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_MULTITHREADING=y
CONFIG_NORDIC_QSPI_NOR=n

CONFIG_BOOT_MAX_IMG_SECTORS=240
